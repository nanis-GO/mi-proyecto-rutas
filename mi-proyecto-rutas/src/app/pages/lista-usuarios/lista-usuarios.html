<div style="padding: 30px; min-height: 100vh; background: linear-gradient(135deg, #121212 0%, #2d005e 100%); color: white; font-family: sans-serif;">
  
  <h2 style="color: #bb86fc; border-left: 5px solid #03dac6; padding-left: 15px; margin-bottom: 25px;">
    📡 Terminal de Datos: Usuarios API
  </h2>

  <div *ngIf="error" style="background: rgba(207, 102, 121, 0.2); border: 1px solid #cf6679; color: #cf6679; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px;">
    <h3 style="margin: 0;">⚠️ ERROR DETECTADO</h3>
    <p>{{ error }}</p>
  </div>

  <div *ngIf="usuarios.length > 0" style="overflow-x: auto; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <table style="width: 100%; border-collapse: collapse; background: #1f1f1f; color: #e0e0e0;">
      <thead>
        <tr style="background: #333; color: #03dac6; text-align: left;">
          <th style="padding: 15px;">Nombre Completo</th>
          <th style="padding: 15px;">Correo Electrónico</th>
          <th style="padding: 15px;">Empresa</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of usuarios" style="border-bottom: 1px solid #333;">
          <td style="padding: 15px;">{{ u.name }}</td>
          <td style="padding: 15px; color: #bb86fc;">{{ u.email }}</td>
          <td style="padding: 15px; color: #aaa;">{{ u.company.name }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <p *ngIf="usuarios.length === 0 && !error" style="text-align: center; color: #bb86fc; margin-top: 20px; font-style: italic;">
    Iniciando conexión con el servidor remoto...
  </p>

</div>
