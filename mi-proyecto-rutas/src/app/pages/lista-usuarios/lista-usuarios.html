<div style="padding: 20px; background: #121212; min-height: 100vh;">
  <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-left: 4px solid #03dac6; padding-left: 15px;">
    <h2 style="color: #bb86fc; margin: 0; font-size: 24px;">📡 Terminal de Datos: Usuarios API</h2>
  </div>

  <p *ngIf="usuarios.length === 0 && !error" style="color: #bb86fc; font-style: italic; text-align: center; margin-top: 50px;">
    Iniciando conexión con el servidor remoto...
  </p>

  <table *ngIf="usuarios.length > 0" style="width: 100%; border-collapse: collapse; background: #1f1f1f; border-radius: 8px; overflow: hidden;">
    <thead>
      <tr style="background: #252525; text-align: left; border-bottom: 2px solid #333;">
        <th style="padding: 15px; color: #03dac6;">Nombre Completo</th>
        <th style="padding: 15px; color: #03dac6;">Correo Electrónico</th>
        <th style="padding: 15px; color: #03dac6;">Empresa</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of usuarios" style="border-bottom: 1px solid #333; transition: background 0.3s;">
        <td style="padding: 15px; color: #e0e0e0;">{{ u.name }}</td>
        <td style="padding: 15px; color: #bb86fc;">{{ u.email }}</td>
        <td style="padding: 15px; color: #9e9e9e;">{{ u.company.name }}</td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="error" style="color: #ff5252; text-align: center; padding: 20px;">{{ error }}</p>
</div>
